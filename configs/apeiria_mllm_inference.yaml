# Inference configuration for Apeiria MLLM
defaults:
  - apeiria_mllm.yaml
  # - train: apeiria_mllm  # 使用group方式
  - _self_

# Override for inference
mode: inference
split: val  # or test

# Model settings
checkpoint_path: ""  # Path to LoRA checkpoint
model_name: "../Qwen3-VL-8B-Instruct"

# Inference settings
num_inference_passes: 16  # Number of inference passes per sample
batch_size: 16  # Batch size for inference
# max_new_tokens: 512
use_sglang_for_generation: true
max_new_tokens: 6000

# Generation parameters
do_sample: true
temperature: 0.3
top_k: 100
top_p: 0.9
num_beams: 1  # Use 1 for sampling
max_retries: 0 # rejection sampling for single-output datasets like ScanRefer and Nr3D

# Output settings
output_dir: "results/apeiria_rollouts"

# Dataset settings
dataset_type: "nr3d"  # or ["sr3d", "synthetic3d"]
num_scenes: 100  # Number of scenes to evaluate, actually dummy
ratio: 1.0  # Fraction of dataset to use

# Feature settings (should match training)
# use_clip_class_embedding: false
# use_proposal_feature: true
object_embedding_type: "discrete_location_separate" 


resume_from_checkpoint: "../apeiria-ckpts/8B/08-14-07/checkpoint-epoch-1/" # DFT-ed by caption-CoT


load_from_cache: false
use_nr3d_plan_from_program: false
add_thinking_trace: false # must be true if use_nr3d_plan_from_program is true
add_thinking_trace_prompt: true
# APEIRIA_OPEN_UNUSED: Legacy 2D image/view feature path. Final release uses
# object/proposal features only; Real3DDataset ignores this field.
image_encoder: ""
proposal_type: uni3d-mask3d-box


# scene() injection
gt_scene_data_path: "" # no gt scene data
# gt_scene_data_path: "data/apeiria_scannet_w_caption_gpt4o_and_corners_and_nyu_names_fixed_segdino3d_pred" # use segdino3d pred sem labels and gt boxes
# gt_scene_data_path: "data/apeiria_scannet_w_caption_gpt4o_and_corners_and_nyu_names_fixed_mask3d_pred_benchmark" # use mask3d pred sem labels and gt boxes
# gt_scene_data_path: "data/apeiria_scannet_w_caption_gpt4o_and_corners_and_nyu_names_fixed" # use gt sem labels and gt boxes

# gt_scene_data_path: "data/apeiria_scannet_w_caption_gpt4o_and_corners_and_nyu_names_fixed_mask3d_box_segdino3d_pred" # use segdino3d pred sem labels, mask3d pred boxes
# gt_scene_data_path: "data/apeiria_scannet_w_caption_gpt4o_and_corners_and_nyu_names_fixed_mask3d_box_mask3d_pred" # use mask3d pred sem labels, mask3d pred boxes


previous_results_path: ""
# previous_results_path: "results/nr3d_rollouts/20260125_170842/all_results.json"   # self thinking, scanrefer with box proposals
# previous_results_path: "results/nr3d_rollouts/20260125_175759/all_results.json"   # self thinking, multi3drefer with box proposals
# previous_results_path: "results/nr3d_rollouts/20260125_162219/all_results.json"     # self thinking, scanrefer with GT proposals

# previous_results_path: "results/nr3d_rollouts/20260115_201502/all_results.json"  # self thinking, scanrefer, used when gt_scene_data_path is provided and external_plan_path is not provided (so use previous results to get the internal plan)
single_prediction_prompt: ""
# single_prediction_prompt: " Please make sure to select exactly one object."
