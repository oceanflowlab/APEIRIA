# resume_from_checkpoint: "/network_space/server127_2/shared/mwt/apeiria-ckpt-2/03-33-04/checkpoint-step-e1-400/" # resumed from step 300, 
# resume_from_checkpoint: "/network_space/server127_2/shared/mwt/apeiria-ckpt-2/14-15-18/checkpoint-epoch6/" # Qwen3VL-8B-Instruct, mega-PT.
resume_from_checkpoint: "../apeiria-output/2025-12-07/20-07-44/checkpoint-epoch8" # DFT-ed by caption-CoT


# resume_from_partial_results_dir: "results/nr3d_rollouts/partial_results_20250710_182843"
# resume_from_partial_results_dir: "results/nr3d_rollouts/partial_results_20250710_224039/"
# resume_from_partial_results_dir: "results/nr3d_rollouts/partial_results_20250731_045852"

load_from_cache: false
use_nr3d_plan_from_program: false
add_thinking_trace: false # must be true if use_nr3d_plan_from_program is true
add_thinking_trace_prompt: true
image_encoder: ""
proposal_type: uni3d-mask3d-box