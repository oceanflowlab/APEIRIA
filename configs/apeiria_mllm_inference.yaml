# Inference configuration for Apeiria MLLM
defaults:
  - apeiria_mllm.yaml
  # - train: apeiria_mllm  # 使用group方式
  - _self_

# Override for inference
mode: inference
split: val  # or test

# Model settings
checkpoint_path: ""  # Path to LoRA checkpoint
model_name: "../Qwen3-VL-4B-Instruct"

# Inference settings
num_inference_passes: 16  # Number of inference passes per sample
batch_size: 16  # Batch size for inference
# max_new_tokens: 512
use_sglang_for_generation: true
max_new_tokens: 6000

# Generation parameters
do_sample: true
temperature: 0.3
top_k: 100
top_p: 0.9
num_beams: 1  # Use 1 for sampling

# Output settings
output_dir: "results/nr3d_rollouts"

# Dataset settings
dataset_type: "nr3d"  # or ["sr3d", "synthetic3d"]
num_scenes: 100  # Number of scenes to evaluate, actually dummy
ratio: 1.0  # Fraction of dataset to use

# Feature settings (should match training)
# use_clip_class_embedding: false
# use_proposal_feature: true
object_embedding_type: "discrete_location_separate" 

